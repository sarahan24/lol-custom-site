<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1대1 매칭 - 롤 내전 관리 사이트</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <div class="container">
    <h1>⚔️ 1대1 매칭</h1>

    <!-- Player Selection Section -->
    <div class="player-selection">
      <h3>참가자 선택</h3>
      <div class="players-list" id="playersList">
        <!-- Players will be dynamically loaded here -->
      </div>
    </div>

    <!-- VS Matches Section -->
    <div class="vs-matches-container">
      <div class="vs-controls">
        <button class="btn-shuffle" onclick="generateRandomMatches()">🔀 랜덤 매칭</button>
        <button class="btn-clear" onclick="clearAllMatches()">🗑️ 초기화</button>
      </div>

      <div class="vs-matches" id="vsMatches">
        <!-- Matches will be dynamically generated here -->
      </div>
    </div>

    <a href="/" class="back-button">← 돌아가기</a>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    let allPlayers = [];
    const MAX_MATCHES = 10;

    // Load all players when page loads
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const response = await fetch('/api/players');
        allPlayers = await response.json();
        displayPlayersList();
        generateMatchSlots();
      } catch (error) {
        console.error('Failed to load players:', error);
      }
    });

    function displayPlayersList() {
      const playersList = document.getElementById('playersList');
      playersList.innerHTML = '';

      allPlayers.forEach((player, index) => {
        const playerItem = document.createElement('div');
        playerItem.className = 'player-item';
        playerItem.innerHTML = `
          <input type="checkbox" id="player-${index}" class="player-checkbox" data-index="${index}" data-nickname="${player.nickname}" checked>
          <label for="player-${index}" class="player-label">${player.nickname}</label>
        `;
        playersList.appendChild(playerItem);
      });
    }

    function generateMatchSlots() {
      const vsMatches = document.getElementById('vsMatches');
      vsMatches.innerHTML = '';

      for (let i = 0; i < MAX_MATCHES; i++) {
        const matchDiv = document.createElement('div');
        matchDiv.className = 'vs-match';
        matchDiv.innerHTML = `
          <div class="vs-player vs-player-1">
            <input type="text" placeholder="선수 1" class="vs-input vs-input-1" maxlength="20">
          </div>
          <div class="vs-divider">VS</div>
          <div class="vs-player vs-player-2">
            <input type="text" placeholder="선수 2" class="vs-input vs-input-2" maxlength="20">
          </div>
          <div class="vs-result">
            <button class="vs-btn-win" onclick="updateVSResult(${i}, 1)">선수 1 승리</button>
            <button class="vs-btn-win" onclick="updateVSResult(${i}, 2)">선수 2 승리</button>
          </div>
        `;
        vsMatches.appendChild(matchDiv);
      }
    }

    function generateRandomMatches() {
      const checkboxes = document.querySelectorAll('.player-checkbox:checked');
      const selectedNicknames = Array.from(checkboxes).map(checkbox => 
        checkbox.getAttribute('data-nickname')
      );

      if (selectedNicknames.length < 2) {
        alert('최소 2명 이상의 참가자를 선택해주세요.');
        return;
      }

      // Shuffle players
      const shuffled = [...selectedNicknames].sort(() => Math.random() - 0.5);

      // Generate matches
      const vsMatches = document.getElementById('vsMatches');
      const matchDivs = vsMatches.querySelectorAll('.vs-match');

      let matchIndex = 0;
      for (let i = 0; i < shuffled.length - 1; i += 2) {
        if (matchIndex < MAX_MATCHES) {
          const inputs = matchDivs[matchIndex].querySelectorAll('.vs-input');
          inputs[0].value = shuffled[i];
          inputs[1].value = shuffled[i + 1];
          matchIndex++;
        }
      }

      // Clear remaining matches
      for (let i = matchIndex; i < MAX_MATCHES; i++) {
        const inputs = matchDivs[i].querySelectorAll('.vs-input');
        inputs[0].value = '';
        inputs[1].value = '';
      }
    }

    function clearAllMatches() {
      const vsMatches = document.getElementById('vsMatches');
      const inputs = vsMatches.querySelectorAll('.vs-input');
      inputs.forEach(input => input.value = '');
    }

    async function updateVSResult(matchIndex, winner) {
      const vsMatches = document.getElementById('vsMatches');
      const matchDivs = vsMatches.querySelectorAll('.vs-match');
      const inputs = matchDivs[matchIndex].querySelectorAll('.vs-input');

      const player1 = inputs[0].value.trim();
      const player2 = inputs[1].value.trim();

      if (!player1 || !player2) {
        alert('양쪽 선수가 모두 입력되어야 합니다.');
        return;
      }

      // Determine winner and loser
      const winnerNickname = winner === 1 ? player1 : player2;
      const loserNickname = winner === 1 ? player2 : player1;

      try {
        // Update winner MT (+5)
        await updatePlayerMT(winnerNickname, 5);
        // Update loser MT (-5)
        await updatePlayerMT(loserNickname, -5);

        alert(`${winnerNickname}가 승리했습니다!\n+5 / -5 적용되었습니다.`);
      } catch (error) {
        console.error('Failed to update result:', error);
        alert('경기 결과 업데이트 중 오류가 발생했습니다.');
      }
    }

    async function updatePlayerMT(nickname, mtChange) {
      try {
        const players = await fetch('/api/players').then(r => r.json());
        let playerIndex = players.findIndex(p => p.nickname === nickname);

        // If player not found, create a new one with MT 0
        if (playerIndex === -1) {
          const createResponse = await fetch('/api/players', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              nickname: nickname,
              tier: '신튜렁',
              mt: mtChange
            })
          });

          if (!createResponse.ok) {
            throw new Error(`Failed to create player: ${createResponse.statusText}`);
          }
          console.log(`Created new player: ${nickname} with MT: ${mtChange}`);
          return;
        }

        // Update existing player
        const response = await fetch(`/api/players/${playerIndex}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            nickname: players[playerIndex].nickname,
            tier: players[playerIndex].tier,
            mt: players[playerIndex].mt + mtChange
          })
        });

        if (!response.ok) {
          throw new Error(`Failed to update player: ${response.statusText}`);
        }
      } catch (error) {
        console.error(`Error updating player ${nickname}:`, error);
        throw error;
      }
    }
  </script>
</body>

</html>
