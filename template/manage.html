<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>참가자 관리</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>

<body>
  <div class="container">
    <h1>⚙️ 참가자 관리</h1>
    <p class="subtitle">참가자 목록을 추가·수정·삭제하세요</p>

    <div id="addPlayer" class="manage-controls">
      <input type="text" id="nickname" placeholder="닉네임">
      <select id="tier">
        <option>신튜렁</option>
        <option>S</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
        <option>D</option>
      </select>
      <input type="number" id="mt" placeholder="MT">
      <button class="primary" onclick="addPlayer()">참가자 추가</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>닉네임</th>
          <th>티어</th>
          <th>MT</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="manageTable"></tbody>
    </table>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>참가자 수정</h2>
      <input type="text" id="editNickname" placeholder="닉네임">
      <select id="editTier">
        <option>신튜렁</option>
        <option>S</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
        <option>D</option>
      </select>
      <input type="number" id="editMt" placeholder="MT">
      <button class="primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</body>

</html>
