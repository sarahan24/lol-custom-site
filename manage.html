<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>참가자 관리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚙️ 참가자 관리</h1>

<div id="addPlayer">

  <input
    type="text"
    id="nickname"
    placeholder="닉네임">

  <select id="tier">
    <option>신튜렁</option>
    <option>S</option>
    <option>A</option>
    <option>B</option>
    <option>C</option>
    <option>D</option>
  </select>

  <input
    type="number"
    id="mt"
    placeholder="MT">

  <button onclick="addPlayer()">
    참가자 추가
  </button>

</div>

<table>
  <thead>
    <tr>
      <th>닉네임</th>
      <th>티어</th>
      <th>MT</th>
      <th>관리</th>
    </tr>
  </thead>

  <tbody id="manageTable"></tbody>
</table>

<div id="editModal" class="modal">

  <div class="modal-content">

    <span
      class="close"
      onclick="closeModal()">
      &times;
    </span>

    <h2>참가자 수정</h2>

    <input
      type="text"
      id="editNickname">

    <select id="editTier">
      <option>신튜렁</option>
      <option>S</option>
      <option>A</option>
      <option>B</option>
      <option>C</option>
      <option>D</option>
    </select>

    <input
      type="number"
      id="editMt">

    <button onclick="saveEdit()">
      저장
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
